        <form action="confirmation.html" id="contactForm">

            <br/>
            <label for="email">Email: *</label>

            <br/>
            <label>Question: </label>

            <input type="radio" id="N" name="question" />No
            <br/>
            <label for="inquiry">Write below: *</label>
            <br/>
            <textarea required cols="50" rows="15" maxlength="300" id="inquiry" name="inquiry"></textarea>
            <br/>
            <input type="submit">
