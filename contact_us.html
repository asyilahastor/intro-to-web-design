    <article>
        <h2>Inquiries</h2>
        <form action="confirmation.html" id="contactForm">
            <label for="name">Name: *</label>
            <input required type="text" id="name" name="fullname" />
            <br/>
            <label for="email">Email: *</label>
            <input required type="email" id="email" name="emailaddress" />
            <br/>
            <label>Question: </label>
            <input type="radio" id="Y" name="question" />Yes
            <input type="radio" id="N" name="question" />No
            <br/>
            <label for="inquiry">Write below: *</label>
            <br/>
            <textarea required cols="50" rows="15" maxlength="300" id="inquiry" name="inquiry"></textarea>
            <br/>
            <input type="submit">
            <button type="button" onclick="ClearForm()">Clear</button>
        </form>
    </article>
